---
# OSSM 3.2 Istio control plane.
# API: sailoperator.io/v1 (NOT maistra.io — that is OSSM 2)
# Namespace enrollment: label namespaces with istio-discovery=enabled istio-injection=enabled
# (replaces ServiceMeshMemberRoll from OSSM 2)
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
  namespace: istio-system
spec:
  version: v1.24
  namespace: istio-system
  values:
    meshConfig:
      discoverySelectors:
        - matchLabels:
            istio-discovery: enabled
