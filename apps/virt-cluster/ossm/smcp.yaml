---
# OpenShift Service Mesh Control Plane — enables Istio on the Virt cluster.
# Required for Track 3 (Java→Quarkus) traffic mirroring and canary shift.
# Applied as part of setup-clusters.sh stage 2b (Track 3 prerequisites).
apiVersion: maistra.io/v2
kind: ServiceMeshControlPlane
metadata:
  name: basic
  namespace: istio-system
spec:
  version: v2.6
  tracing:
    type: None
  policy:
    type: Istiod
  telemetry:
    type: Istiod
  addons:
    kiali:
      enabled: true
    prometheus:
      enabled: true
    grafana:
      enabled: false
  proxy:
    networking:
      trafficControl:
        inbound:
          excludedPorts: [22]
