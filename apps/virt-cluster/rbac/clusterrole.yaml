apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: conductor-agent-role
  labels:
    ztp-modernization-factory: "true"
rules:
  # KubeVirt — VM lifecycle
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances", "virtualmachineinstancemigrations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # MTV (Forklift) — migration resources
  - apiGroups: ["forklift.konveyor.io"]
    resources: ["providers", "plans", "migrations", "networkmaps", "storagemaps", "hosts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Tekton — pipeline governance
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns", "pipelines", "tasks"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # OADP / Velero — backup policies
  - apiGroups: ["velero.io"]
    resources: ["backups", "restores", "backupstoragelocations", "schedules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Core — pods, namespaces, configmaps, secrets
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces", "configmaps", "secrets", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # OCP Virt instance types
  - apiGroups: ["instancetype.kubevirt.io"]
    resources: ["virtualmachineinstancetypes", "virtualmachinepreferences", "virtualmachineclusterinstancetypes", "virtualmachineclusterpreferences"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
