apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: grafana
  labels:
    ztp-modernization-factory: "true"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: OpenShift Prometheus
        type: prometheus
        access: proxy
        url: https://thanos-querier.openshift-monitoring.svc:9091
        isDefault: true
        jsonData:
          httpHeaderName1: Authorization
          tlsSkipVerify: true
        secureJsonData:
          httpHeaderValue1: "Bearer PLACEHOLDER_TOKEN"
        editable: true
