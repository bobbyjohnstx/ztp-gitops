# RBAC: allow conductor's default SA to create/manage Garak Jobs and read pod logs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: conductor-job-manager
  namespace: conductor-ai
  labels:
    ztp-modernization-factory: "true"
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: conductor-job-manager
  namespace: conductor-ai
  labels:
    ztp-modernization-factory: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: conductor-job-manager
subjects:
  - kind: ServiceAccount
    name: default
    namespace: conductor-ai
