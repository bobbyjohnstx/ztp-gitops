# Garak Red-Team Scan — on-demand Job targeting the active vLLM endpoint.
# Triggered by: POST /api/v1/skills/red_team  (conductor creates job via in-cluster API)
#          or:  oc delete job garak-red-team -n conductor-ai --ignore-not-found
#               oc apply -f gitops/apps/ai-cluster/garak/job.yaml
#               oc logs -f job/garak-red-team -n conductor-ai
apiVersion: v1
kind: ConfigMap
metadata:
  name: garak-scan
  namespace: conductor-ai
  labels:
    ztp-modernization-factory: "true"
data:
  run.py: |
    #!/usr/bin/env python3
    """ZTP Garak red-team — installs garak and scans the active vLLM endpoint."""
    import os, subprocess, sys, glob, json

    endpoint    = os.environ.get("VLLM_BASE_URL", "http://qwen3-30b.qwen3.svc.cluster.local:8080")
    model       = os.environ.get("RHOAI_MODEL_NAME", "qwen3-30b")
    probes      = os.environ.get("GARAK_PROBES",
                      "promptinject,dan,encoding")
    generations = os.environ.get("GARAK_GENERATIONS", "5")

    print(f"=== ZTP Garak Red-Team Scan ===")
    print(f"Target:      {endpoint}/v1")
    print(f"Model:       {model}")
    print(f"Probes:      {probes}")
    print(f"Generations: {generations}")
    print()

    subprocess.run([sys.executable, "-m", "pip", "install", "garak", "-q"], check=True)

    env = os.environ.copy()
    env["OPENAI_API_BASE"] = f"{endpoint}/v1"
    env["OPENAI_API_KEY"]  = "unused"

    result = subprocess.run([
        sys.executable, "-m", "garak",
        "--target_type",   "openai",
        "--target_name",   model,
        "--probes",        probes,
        "--generations",   generations,
        "--report_prefix", "/tmp/garak",
    ], env=env)

    reports = glob.glob("/tmp/garak.*.report.jsonl")
    if reports:
        passed = failed = total = 0
        with open(reports[0]) as fh:
            for line in fh:
                try:
                    rec = json.loads(line)
                    if rec.get("entry_type") == "eval":
                        total += 1
                        if rec.get("passed"):
                            passed += 1
                        else:
                            failed += 1
                except Exception:
                    pass
        print(f"\n=== SCAN SUMMARY ===")
        print(f"Total: {total} | Passed: {passed} | Vulnerable: {failed}")
        with open(reports[0]) as fh:
            for line in fh:
                print(line, end="")
    sys.exit(result.returncode)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: garak-red-team
  namespace: conductor-ai
  labels:
    app: garak
    ztp-modernization-factory: "true"
  annotations:
    description: "Garak LLM red-team scan against active vLLM endpoint"
spec:
  ttlSecondsAfterFinished: 7200
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: garak
    spec:
      restartPolicy: Never
      containers:
        - name: garak
          image: python:3.11-slim
          command: ["python", "/scripts/run.py"]
          env:
            - name: HOME
              value: "/tmp"
            - name: VLLM_BASE_URL
              value: "http://qwen3-30b.qwen3.svc.cluster.local:8080"
            - name: RHOAI_MODEL_NAME
              value: "qwen3-30b"
            - name: GARAK_PROBES
              value: "promptinject,dan,encoding"
            - name: GARAK_GENERATIONS
              value: "5"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: scripts
          configMap:
            name: garak-scan
