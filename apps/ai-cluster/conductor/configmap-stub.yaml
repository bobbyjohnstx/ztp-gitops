    # ── skill_self_heal ───────────────────────────────────────────────────────

    def _heuristic_classify(error_message):
        msg = (error_message or "").lower()
        if "timeout" in msg or "timed out" in msg:
            return "transient", "low"
        if "401" in msg or "403" in msg or "unauthorized" in msg or "forbidden" in msg:
            return "auth", "high"
        if "404" in msg or "not found" in msg:
            return "config", "medium"
        if "quota" in msg or "limit" in msg or "insufficient" in msg:
            return "resource", "high"
        if "connection" in msg or "refused" in msg or "reset" in msg:
            return "transient", "medium"
        return "permanent", "medium"

    def self_heal(skill_name, error_message, context=None):
        classification, severity = _heuristic_classify(error_message)
        if not GRANITE_URL:
            return {
                "status": "ok", "classifier": "heuristic",
                "skill_name": skill_name,
                "classification": classification, "severity": severity,
                "remediation_steps": [f"Check {classification} issue for {skill_name}"],
                "retry_suggestion": None,
            }
        safe_skill = _sanitize(skill_name, 40)
        safe_error = _sanitize(error_message, 200)
        safe_ctx = _sanitize(json.dumps(context or {}), 300)
        prompt = (
            "You are an OpenShift migration expert diagnosing a skill failure.\n\n"
            f"Skill: {safe_skill}\n"
            f"Error: {safe_error}\n"
            f"Context: {safe_ctx}\n\n"
            "Respond with ONLY a JSON object:\n"
            '{"classification": "transient|permanent|auth|config|resource",'
            ' "severity": "low|medium|high|critical",'
            ' "remediation_steps": ["step1", "step2"],'
            ' "retry_suggestion": {"wait_seconds": 30, "modified_params": {}} or null}'
        )
        try:
            resp = _json_req(
                GRANITE_URL.rstrip("/") + "/v1/chat/completions",
                payload={
                    "model":       GRANITE_MODEL,
                    "messages":    [
                        {"role": "system", "content": ZTP_SYSTEM_PROMPT},
                        {"role": "user",   "content": prompt},
                    ],
                    "temperature": 0.1,
                    "max_tokens":  256,
                    "chat_template_kwargs": {"enable_thinking": False},
                },
            )
            content = resp["choices"][0]["message"]["content"].strip()
            m = re.search(r'\{.*\}', content, re.DOTALL)
            if m:
                parsed = json.loads(m.group(0))
                parsed["status"] = "ok"
                parsed["classifier"] = "granite"
                parsed["skill_name"] = skill_name
                return parsed
        except Exception:
            pass
        return {
            "status": "ok", "classifier": "heuristic",
            "skill_name": skill_name,
            "classification": classification, "severity": severity,
            "remediation_steps": [f"Check {classification} issue for {skill_name}"],
            "retry_suggestion": None,
        }


    # ── skill_migration_validator ────────────────────────────────────────────

    _EXPECTED_PORTS = {
        "database": [22, 3306],
        "winweb": [80, 3389],
        "haproxy": [80, 5000],
    }

    def migration_validator(namespace="mtv-migrated-user1", vm_names=None, port_scan=True):
        if not CLUSTER1_API_URL or not CLUSTER1_TOKEN:
            return {"status": "error",
                    "error": "CLUSTER1_API_URL / CLUSTER1_TOKEN not configured"}
        base = CLUSTER1_API_URL
        tok  = CLUSTER1_TOKEN
        try:
            resp = _k8s_req(
                base + f"/apis/kubevirt.io/v1/namespaces/{namespace}/virtualmachineinstances",
                tok)
            vmis = resp.get("items", [])
        except Exception as e:
            return {"status": "error", "error": str(e)}

        if vm_names:
            vmis = [v for v in vmis if v["metadata"]["name"] in vm_names]

        try:
            pvcs_resp = _k8s_req(
                base + f"/api/v1/namespaces/{namespace}/persistentvolumeclaims", tok)
            pvcs = {p["metadata"]["name"]: p for p in pvcs_resp.get("items", [])}
        except Exception:
            pvcs = {}

        validations = []
        for vmi in vmis:
            name = vmi["metadata"]["name"]
            status = vmi.get("status", {})
            conditions = {c["type"]: c.get("status") == "True"
                          for c in status.get("conditions", [])}
            guest = status.get("guestOSInfo", {})
            ifaces = status.get("interfaces", [])
            ip = ifaces[0].get("ipAddress", "") if ifaces else ""
            mac = ifaces[0].get("mac", "") if ifaces else ""
            iface_name = ifaces[0].get("interfaceName", "") if ifaces else ""

            vols = vmi.get("spec", {}).get("volumes", [])
            disk_count = 0
            total_gb = 0
            sc = ""
            for vol in vols:
                dv = vol.get("dataVolume", {}).get("name", "")
                pvc_name = vol.get("persistentVolumeClaim", {}).get("claimName", dv)
                if pvc_name and pvc_name in pvcs:
                    disk_count += 1
                    cap = pvcs[pvc_name].get("status", {}).get("capacity", {}).get("storage", "0")
                    gb = int(cap.replace("Gi", "")) if "Gi" in cap else 0
                    total_gb += gb
                    sc = pvcs[pvc_name].get("spec", {}).get("storageClassName", sc)

            expected = []
            for pattern, ports in _EXPECTED_PORTS.items():
                if pattern in name.lower():
                    expected = ports
                    break

            issues = []
            if status.get("phase") != "Running":
                issues.append(f"VMI not running (phase={status.get('phase')})")
            if not conditions.get("AgentConnected"):
                issues.append("Guest agent not connected")
            if not guest.get("name"):
                issues.append("Guest OS info not reported")
            if not ip:
                issues.append("No IP address assigned")

            health = "healthy"
            if issues:
                health = "degraded" if status.get("phase") == "Running" else "unhealthy"

            entry = {
                "vm_name": name,
                "namespace": namespace,
                "phase": status.get("phase", "Unknown"),
                "node": status.get("nodeName", ""),
                "ip_address": ip,
                "guest_agent": {
                    "connected": conditions.get("AgentConnected", False),
                    "os_name": guest.get("prettyName", guest.get("name", "")),
                    "os_version": guest.get("versionId", ""),
                    "kernel": guest.get("kernelRelease", ""),
                },
                "network": {
                    "interface": iface_name,
                    "mac_address": mac,
                    "ip_addresses": ifaces[0].get("ipAddresses", []) if ifaces else [],
                },
                "storage": {
                    "disks": disk_count,
                    "total_gb": total_gb,
                    "storage_class": sc,
                },
                "ports": [],
                "live_migratable": conditions.get("LiveMigratable", False),
                "health": health,
                "issues": issues,
            }
            validations.append(entry)

        summary = {"healthy": 0, "degraded": 0, "unhealthy": 0}
        for v in validations:
            summary[v["health"]] = summary.get(v["health"], 0) + 1

        all_ok = summary["unhealthy"] == 0
        return {
            "status": "ok" if all_ok and summary["degraded"] == 0 else "partial" if all_ok else "failed",
            "vm_count": len(validations),
            "validations": validations,
            "summary": summary,
        }


    # ── red_team — Garak LLM red-team scan ──────────────────────────────────

    def red_team(probes=None, generations=5):
        probes = probes or "promptinject,dan,encoding"
        ns  = "conductor-ai"
        k8s = "https://kubernetes.default.svc"
        sa_tok_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        try:
            with open(sa_tok_path) as fh:
                tok = fh.read().strip()
        except Exception as e:
            return {"status": "error", "error": f"in-cluster SA token unavailable: {e}"}

        ctx = _ssl_ctx(verify=False)

        # Delete existing job (idempotent re-run)
        try:
            _k8s_req(f"{k8s}/apis/batch/v1/namespaces/{ns}/jobs/garak-red-team",
                     tok, method="DELETE", body={"propagationPolicy": "Foreground"})
        except Exception:
            pass
        import time as _t
        _t.sleep(5)

        job = {
            "apiVersion": "batch/v1", "kind": "Job",
            "metadata": {"name": "garak-red-team", "namespace": ns,
                         "labels": {"app": "garak"}},
            "spec": {
                "ttlSecondsAfterFinished": 7200, "backoffLimit": 0,
                "template": {
                    "metadata": {"labels": {"app": "garak"}},
                    "spec": {
                        "restartPolicy": "Never",
                        "containers": [{
                            "name": "garak",
                            "image": "python:3.11-slim",
                            "command": ["python", "/scripts/run.py"],
                            "env": [
                                {"name": "VLLM_BASE_URL",      "value": GRANITE_URL},
                                {"name": "RHOAI_MODEL_NAME",   "value": GRANITE_MODEL},
                                {"name": "GARAK_PROBES",       "value": probes},
                                {"name": "GARAK_GENERATIONS",  "value": str(generations)},
                            ],
                            "volumeMounts": [{"name": "scripts", "mountPath": "/scripts"}],
                            "resources": {
                                "requests": {"cpu": "500m", "memory": "1Gi"},
                                "limits":   {"cpu": "2",    "memory": "2Gi"},
                            },
                        }],
                        "volumes": [{"name": "scripts",
                                     "configMap": {"name": "garak-scan"}}],
                    },
                },
            },
        }

        try:
            _k8s_create(f"{k8s}/apis/batch/v1/namespaces/{ns}/jobs", tok, job)
        except Exception as e:
            return {"status": "error", "error": f"job create failed: {e}"}

        # Poll up to 10 min for completion
        deadline = _t.time() + 600
        while _t.time() < deadline:
            _t.sleep(15)
            try:
                jstatus = _k8s_req(
                    f"{k8s}/apis/batch/v1/namespaces/{ns}/jobs/garak-red-team", tok)
                conds = jstatus.get("status", {}).get("conditions", [])
                if any(c["type"] == "Complete" and c["status"] == "True" for c in conds):
                    break
                if any(c["type"] == "Failed" and c["status"] == "True" for c in conds):
                    return {"status": "error", "error": "garak job failed",
                            "job_status": jstatus.get("status")}
            except Exception:
                pass
        else:
            return {"status": "error", "error": "garak job timed out after 10 min"}

        # Fetch pod logs
        logs = ""
        try:
            pods = _k8s_req(
                f"{k8s}/api/v1/namespaces/{ns}/pods?labelSelector=app%3Dgarak", tok)
            pod_name = pods["items"][0]["metadata"]["name"] if pods.get("items") else None
            if pod_name:
                req = urllib.request.Request(
                    f"{k8s}/api/v1/namespaces/{ns}/pods/{pod_name}/log",
                    headers={"Authorization": f"Bearer {tok}"})
                with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                    logs = r.read().decode(errors="replace")
        except Exception as e:
            logs = f"(log fetch error: {e})"

        # Parse summary line from logs
        total = passed = failed = 0
        for line in logs.splitlines():
            if "Total:" in line and "Passed:" in line:
                import re as _re
                m = _re.search(r"Total:\s*(\d+).*Passed:\s*(\d+).*Vulnerable:\s*(\d+)", line)
                if m:
                    total, passed, failed = int(m.group(1)), int(m.group(2)), int(m.group(3))

        return {
            "status": "ok",
            "probes": probes,
            "generations": generations,
            "model": GRANITE_MODEL,
            "summary": {"total": total, "passed": passed, "vulnerable": failed},
            "logs": logs[-4000:] if len(logs) > 4000 else logs,
        }


    # ── /api/v1/migrate — end-to-end orchestration ───────────────────────────

    def migrate(vs_url, vs_user, vs_pass, options=None):
        import uuid
        opts = options or {}
        target_ns = opts.get("target_namespace", "mtv-migrated")
        granite = opts.get("granite_url", GRANITE_URL)
        timeout = opts.get("timeout", 60)
        steps = {}

        try:
            inventory = vsphere_discover(vs_url, vs_user, vs_pass)
            steps["discover"] = {"status": inventory.get("status", "error"),
                                 "vm_count": inventory.get("vm_count", 0)}
        except Exception as e:
            heal = self_heal("vsphere_discover", str(e))
            return {"status": "error", "step_failed": "discover",
                    "error": str(e), "self_heal": heal, "steps": steps}

        vms = inventory.get("vms", [])
        if not vms:
            return {"status": "ok", "vm_count": 0,
                    "message": "No VMs found", "steps": steps}

        try:
            classified = guest_analyzer(vms, granite_url=granite)
            steps["classify"] = {"status": classified.get("status", "error"),
                                 "summary": classified.get("summary", {})}
        except Exception as e:
            steps["classify"] = {"status": "error", "error": str(e)}
            classified = {"classifications": [
                {"vm_id": v.get("id"), "vm_name": v.get("name"),
                 "track": 1, "reason": "fallback"} for v in vms]}

        track_1 = [c for c in classified.get("classifications", []) if c.get("track") == 1]
        track_2 = [c for c in classified.get("classifications", []) if c.get("track") == 2]
        track_3 = [c for c in classified.get("classifications", []) if c.get("track") == 3]

        if track_1:
            t1_vms = [{"id": c["vm_id"], "name": c["vm_name"]} for c in track_1]
            try:
                t1_result = mtv_manifest_gen(t1_vms, target_namespace=target_ns,
                                             timeout=timeout)
                steps["track_1"] = {"status": t1_result.get("status"),
                                    "plan": t1_result.get("plan_name"),
                                    "vms": [c["vm_name"] for c in track_1]}
                try:
                    mig_name = t1_result.get("migration_name", "user1-migration-run-1")
                    gov = pipeline_trigger(t1_vms, track="1",
                                          target_namespace=target_ns,
                                          migration_name=mig_name, timeout=timeout)
                    steps["track_1_governance"] = {"status": gov.get("status"),
                                                   "run": gov.get("pipeline_run_name")}
                except Exception as eg:
                    steps["track_1_governance"] = {"status": "warning", "error": str(eg)}
            except Exception as e:
                steps["track_1"] = {"status": "error", "error": str(e)}

        if track_2:
            t2_vms = [{"id": c.get("vm_id", ""), "name": c["vm_name"]} for c in track_2]
            try:
                t2_result = pipeline_trigger(t2_vms, track="2",
                                             target_namespace=target_ns, timeout=timeout)
                steps["track_2"] = {"status": t2_result.get("status"),
                                    "run": t2_result.get("pipeline_run_name"),
                                    "vms": [c["vm_name"] for c in track_2]}
            except Exception as e:
                steps["track_2"] = {"status": "error", "error": str(e)}

        if track_3:
            t3_vms = [{"id": c.get("vm_id", ""), "name": c["vm_name"]} for c in track_3]
            try:
                t3_result = pipeline_trigger(t3_vms, track="3",
                                             target_namespace=target_ns, timeout=timeout)
                steps["track_3"] = {"status": t3_result.get("status"),
                                    "run": t3_result.get("pipeline_run_name"),
                                    "vms": [c["vm_name"] for c in track_3]}
            except Exception as e:
                steps["track_3"] = {"status": "error", "error": str(e)}

        all_ok = all(s.get("status") in ("ok", "Timeout", "Succeeded")
                     for s in steps.values())
        return {
            "status":   "ok" if all_ok else "partial",
            "vm_count": len(vms),
            "track_summary": classified.get("summary", {}),
            "steps":    steps,
        }


    # ── Langfuse tracing helpers ─────────────────────────────────────────────

    _TRACE_BUFFER = []
    _METRICS_CALLS = {}
    _METRICS_DURATIONS = {}
    _METRICS_ERRORS = {}

    def _metrics_record(skill, status, duration_ms, error=None):
        key = (skill, status)
        _METRICS_CALLS[key] = _METRICS_CALLS.get(key, 0) + 1
        _METRICS_DURATIONS.setdefault(skill, []).append(duration_ms / 1000.0)
        if error:
            etype = "timeout" if "timeout" in error.lower() else \
                    "auth" if any(c in error.lower() for c in ("401", "403", "unauthorized")) else \
                    "notfound" if "404" in error else \
                    "connection" if "connection" in error.lower() else "other"
            ekey = (skill, etype)
            _METRICS_ERRORS[ekey] = _METRICS_ERRORS.get(ekey, 0) + 1

    def _render_metrics():
        lines = []
        lines.append("# HELP conductor_skill_calls_total Total skill invocations")
        lines.append("# TYPE conductor_skill_calls_total counter")
        for (skill, status), count in sorted(_METRICS_CALLS.items()):
            lines.append(f'conductor_skill_calls_total{{skill="{skill}",status="{status}"}} {count}')
        lines.append("# HELP conductor_skill_duration_seconds Skill execution duration")
        lines.append("# TYPE conductor_skill_duration_seconds histogram")
        buckets = [0.01, 0.1, 1.0, 10.0, 60.0]
        for skill in sorted(_METRICS_DURATIONS.keys()):
            durs = _METRICS_DURATIONS[skill]
            for b in buckets:
                c = sum(1 for d in durs if d <= b)
                lines.append(f'conductor_skill_duration_seconds_bucket{{skill="{skill}",le="{b}"}} {c}')
            lines.append(f'conductor_skill_duration_seconds_bucket{{skill="{skill}",le="+Inf"}} {len(durs)}')
            lines.append(f'conductor_skill_duration_seconds_sum{{skill="{skill}"}} {sum(durs):.4f}')
            lines.append(f'conductor_skill_duration_seconds_count{{skill="{skill}"}} {len(durs)}')
        lines.append("# HELP conductor_skill_errors_total Skill errors by type")
        lines.append("# TYPE conductor_skill_errors_total counter")
        for (skill, etype), count in sorted(_METRICS_ERRORS.items()):
            lines.append(f'conductor_skill_errors_total{{skill="{skill}",error_type="{etype}"}} {count}')
        lines.append("# HELP gen_ai_client_operation_duration_seconds GenAI operation duration (OTel)")
        lines.append("# TYPE gen_ai_client_operation_duration_seconds gauge")
        for skill, durs in sorted(_METRICS_DURATIONS.items()):
            if durs:
                lines.append(f'gen_ai_client_operation_duration_seconds{{operation="{skill}"}} {durs[-1]:.4f}')
        return "\n".join(lines) + "\n"

    def _langfuse_auth():
        return base64.b64encode(f"{LANGFUSE_PK}:{LANGFUSE_SK}".encode()).decode()

    def _langfuse_post(path, payload):
        if not LANGFUSE_URL or not LANGFUSE_PK or not LANGFUSE_SK:
            return None
        try:
            return _json_req(
                LANGFUSE_URL + path,
                payload=payload,
                headers={"Authorization": f"Basic {_langfuse_auth()}"},
            )
        except Exception:
            return None

    def _trace_skill(skill_name, inputs, func, *args, **kwargs):
        import uuid
        trace_id = str(uuid.uuid4())
        t0 = time.time()
        start_iso = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime(t0))
        error = None
        result = None
        try:
            result = func(*args, **kwargs)
            return result
        except Exception as e:
            error = str(e)
            raise
        finally:
            t1 = time.time()
            end_iso = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime(t1))
            duration_ms = round((t1 - t0) * 1000)
            status = result.get("status", "unknown") if isinstance(result, dict) else "error"
            trace = {
                "id": trace_id, "name": skill_name,
                "timestamp": start_iso,
                "input": inputs,
                "output": {"status": status, "duration_ms": duration_ms},
                "metadata": {"error": error},
            }
            _langfuse_post("/api/public/traces", trace)
            _langfuse_post("/api/public/spans", {
                "traceId": trace_id, "name": skill_name,
                "startTime": start_iso, "endTime": end_iso,
                "input": inputs, "output": result,
                "metadata": {"duration_ms": duration_ms},
                "level": "ERROR" if error else "DEFAULT",
                "statusMessage": error or "ok",
            })
            entry = {"id": trace_id, "name": skill_name,
                     "timestamp": start_iso, "duration_ms": duration_ms,
                     "status": status, "error": error}
            _metrics_record(skill_name, status, duration_ms, error)
            _TRACE_BUFFER.append(entry)
            if len(_TRACE_BUFFER) > 100:
                _TRACE_BUFFER.pop(0)

    def _langfuse_list_traces(limit=20):
        recent = list(reversed(_TRACE_BUFFER[-limit:]))
        return {"status": "ok", "trace_count": len(_TRACE_BUFFER), "traces": recent}


