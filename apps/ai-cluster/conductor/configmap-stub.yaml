                        vsphere_provider=body.get("vsphere_provider", "vmware"),
                        warm=body.get("warm", False),
                        timeout=body.get("timeout", 600),
                    )
                    self._ok(result)
                except Exception as e:
                    self._reply(500, {"error": str(e)})

            elif self.path == "/api/v1/skills/pipeline_trigger":
                vms = body.get("vms", [])
                if not vms:
                    self._reply(400, {"error": "vms array required"})
                    return
