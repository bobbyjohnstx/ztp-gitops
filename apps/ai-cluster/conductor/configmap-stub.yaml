apiVersion: v1
kind: ConfigMap
metadata:
  name: conductor-stub-code
  namespace: conductor-ai
  labels:
    ztp-modernization-factory: "true"
data:
  app.py: |
    import json
    from http.server import HTTPServer, BaseHTTPRequestHandler

    HEALTH = {"status": "UP"}
    SKILLS = ["vsphere_discover", "guest_analyzer", "mtv_manifest_gen",
              "pipeline_trigger", "evalops_trace", "self_heal"]


    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path.startswith("/q/health") or self.path.startswith("/api/v1/cluster1/health"):
                self._ok(HEALTH)
            elif self.path == "/api/v1/skills":
                self._ok({"skills": SKILLS, "status": "stub"})
            else:
                self._ok({"status": "stub", "path": self.path})

        def _ok(self, body):
            data = json.dumps(body).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def log_message(self, format, *args):  # noqa: A002
            pass


    if __name__ == "__main__":
        print("Conductor extensions stub listening on :8080", flush=True)
        HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
