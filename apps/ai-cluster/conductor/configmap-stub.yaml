apiVersion: v1
kind: ConfigMap
metadata:
  name: conductor-stub-code
  namespace: conductor-ai
  labels:
    ztp-modernization-factory: "true"
data:
  app.py: |
    import json
    import os
    import ssl
    import base64
    import re
    import time
    import threading
    from http.server import ThreadingHTTPServer, BaseHTTPRequestHandler
    from urllib.request import Request, urlopen
    from urllib.error import URLError, HTTPError

    HEALTH = {"status": "UP"}
    SKILLS = ["vsphere_discover", "guest_analyzer", "mtv_manifest_gen",
              "pipeline_trigger", "evalops_trace", "self_heal",
              "oadp_policy", "instancetype_gen"]

    DEFAULT_VSPHERE_URL  = os.environ.get("VSPHERE_URL", "")
    DEFAULT_VSPHERE_USER = os.environ.get("VSPHERE_USER", "")
    DEFAULT_VSPHERE_PASS = os.environ.get("VSPHERE_PASSWORD", "")
    GRANITE_URL          = os.environ.get("RHOAI_GRANITE_URL", "")
    GRANITE_MODEL        = "granite-33-8b-instruct"
    CLUSTER1_API_URL     = os.environ.get("CLUSTER1_API_URL", "").rstrip("/")
    CLUSTER1_TOKEN       = os.environ.get("CLUSTER1_TOKEN", "")
    MTV_NS               = "openshift-mtv"
    TEKTON_NS            = "ztp-factory"
    LANGFUSE_URL         = os.environ.get("LANGFUSE_URL", "").rstrip("/")
    LANGFUSE_PK          = os.environ.get("LANGFUSE_PUBLIC_KEY", "")
    LANGFUSE_SK          = os.environ.get("LANGFUSE_SECRET_KEY", "")


    # ── Input sanitization ─────────────────────────────────────────────────

    def _sanitize(text, max_len=120):
        t = re.sub(r'[^\x20-\x7E]', '', str(text or ''))[:max_len]
        t = re.sub(r'(?i)(ignore|disregard|forget|override)\s+(all|previous|above|prior|system)', '[FILTERED]', t)
        t = re.sub(r'(?i)(you are now|act as|pretend|new instructions|system prompt)', '[FILTERED]', t)
        return t


    # ── HTTP helpers ──────────────────────────────────────────────────────────

    def _ssl_ctx():
        ctx = ssl.create_default_context()
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE
        return ctx

    def _json_req(url, payload=None, headers=None, method=None):
        hdrs = {"Accept": "application/json", "Content-Type": "application/json"}
        if headers:
            hdrs.update(headers)
        data = json.dumps(payload).encode() if payload is not None else None
        if method is None:
            method = "POST" if data else "GET"
        req = Request(url, data=data, headers=hdrs, method=method)
        with urlopen(req, context=_ssl_ctx(), timeout=30) as r:
            raw = r.read()
            return json.loads(raw) if raw else None


    # ── vSphere REST helpers ──────────────────────────────────────────────────

    def _vs_req(base, path, method="GET", token=None, user=None, pwd=None):
        url = base.rstrip("/") + path
        hdrs = {"Accept": "application/json", "Content-Type": "application/json"}
        body = None
        if token:
            hdrs["vmware-api-session-id"] = token
        elif user and pwd:
            hdrs["Authorization"] = "Basic " + base64.b64encode(
                f"{user}:{pwd}".encode()).decode()
        req = Request(url, data=body, headers=hdrs, method=method)
        with urlopen(req, context=_ssl_ctx(), timeout=20) as r:
            raw = r.read()
            return json.loads(raw) if raw else None

    def vsphere_discover(url, user, pwd):
        tok_raw = _vs_req(url, "/api/session", method="POST", user=user, pwd=pwd)
        token = tok_raw.strip('"') if isinstance(tok_raw, str) else tok_raw
        try:
            vms_raw        = _vs_req(url, "/api/vcenter/vm",        token=token) or []
            networks_raw   = _vs_req(url, "/api/vcenter/network",   token=token) or []
            datastores_raw = _vs_req(url, "/api/vcenter/datastore", token=token) or []
            vms = []
            for vm in vms_raw[:30]:
                vm_id = vm.get("vm", "")
                entry = {
                    "id":          vm_id,
                    "name":        vm.get("name", ""),
                    "power_state": vm.get("power_state", ""),
                    "cpu_count":   vm.get("cpu_count", 0),
                    "memory_gb":   round(vm.get("memory_size_MiB", 0) / 1024, 1),
                }
                try:
                    det = _vs_req(url, f"/api/vcenter/vm/{vm_id}", token=token) or {}
                    disks = det.get("disks", {})
                    entry["disk_gb"] = round(sum(
                        d.get("value", {}).get("capacity", 0)
                        for d in disks.values()
                    ) / (1024 ** 3), 1)
                    entry["guest_os"] = det.get("guest_OS", "")
                    entry["nics"] = [
                        {
                            "network_id":  n.get("value", {}).get("backing", {}).get("network", ""),
                            "mac_address": n.get("value", {}).get("mac_address", ""),
                        }
                        for n in det.get("nics", {}).values()
                    ]
                except Exception:
                    pass
                vms.append(entry)
            networks = [
                {"id": n.get("network", ""), "name": n.get("name", ""), "type": n.get("type", "")}
                for n in networks_raw
            ]
            datastores = [
                {
                    "id":          d.get("datastore", ""),
                    "name":        d.get("name", ""),
                    "type":        d.get("type", ""),
                    "capacity_gb": round(d.get("capacity", 0) / (1024 ** 3), 1),
                    "free_gb":     round(d.get("free_space", 0) / (1024 ** 3), 1),
                }
                for d in datastores_raw
            ]
            return {
                "status":     "ok",
                "vm_count":   len(vms),
                "vms":        vms,
                "networks":   networks,
                "datastores": datastores,
            }
        finally:
            try:
                _vs_req(url, "/api/session", method="DELETE", token=token)
            except Exception:
                pass


    # ── skill_guest_analyzer ──────────────────────────────────────────────────

    _TRACK_RULES = [
        # (pattern in name or guest_os, track, reason)
        (r"windows|WINDOWS",               1, "Windows OS — lift-and-shift via MTV"),
        (r"haproxy|lb[-_]|loadbal",        1, "Network appliance — opaque, migrate as-is"),
        (r"[-_]tpl\b|template",             0, "Template — skip migration"),
        (r"database|db[-_]|mysql|postgres|oracle|mssql", 1, "Database — stateful, Track 1 via MTV"),
        (r"java|spring|quarkus|jboss|wildfly|eap",       3, "Java workload — modernize to Quarkus"),
        (r"web|app|service|api|micro",     2, "Web/app workload — replatform to container"),
    ]

    def _rule_classify(vm):
        text = (vm.get("name", "") + " " + vm.get("guest_os", "")).lower()
        for pattern, track, reason in _TRACK_RULES:
            if re.search(pattern, text, re.IGNORECASE):
                return track, reason
        return None, None

    def _llm_classify(vms, granite_url):
        vm_lines = "\n".join(
            f"- {_sanitize(v['name'], 60)}: {_sanitize(v.get('guest_os','unknown'), 40)} | "
            f"{v.get('cpu_count',0)} vCPU | {v.get('memory_gb',0)}GB RAM | "
            f"{v.get('disk_gb',0)}GB disk | {_sanitize(v.get('power_state',''), 20)}"
            for v in vms
        )
        prompt = (
            "You are a Red Hat migration expert. Classify each VM into a migration track.\n\n"
            "Tracks:\n"
            "- Track 1 (Virtualize): Windows VMs, network appliances, databases"
            " — migrate as-is to OCP Virt via MTV\n"
            "- Track 2 (Replatform): Linux apps (web, APIs, services)"
            " — containerize via Shipwright/S2I\n"
            "- Track 3 (Modernize): Java apps — refactor to Quarkus microservices\n"
            "- Track 0 (Skip): Templates, infrastructure VMs not suitable for migration\n\n"
            "VMs to classify:\n"
            f"{vm_lines}\n\n"
            "Respond with ONLY a JSON array, no explanation:\n"
            '[{"name": "vm-name", "track": 1, "reason": "one sentence"}]'
        )

        resp = _json_req(
            granite_url.rstrip("/") + "/v1/chat/completions",
            payload={
                "model":       GRANITE_MODEL,
                "messages":    [{"role": "user", "content": prompt}],
                "temperature": 0.1,
                "max_tokens":  512,
            },
        )
        content = resp["choices"][0]["message"]["content"].strip()
        # Extract JSON array from response (model may add prose)
        m = re.search(r'\[.*\]', content, re.DOTALL)
        if m:
            return json.loads(m.group(0))
        return []

    def guest_analyzer(vms, granite_url=None):
        results = []
        llm_queue = []

        for vm in vms:
            track, reason = _rule_classify(vm)
            if track is not None:
                results.append({
                    "vm_id":      vm.get("id", ""),
                    "vm_name":    vm.get("name", ""),
                    "track":      track,
                    "reason":     reason,
                    "classifier": "rules",
                })
            else:
                llm_queue.append(vm)

        # LLM classification for ambiguous VMs
        if llm_queue and granite_url:
            try:
                llm_results = _llm_classify(llm_queue, granite_url)
                name_map = {v["name"]: v for v in llm_queue}
                for lr in llm_results:
                    vm = name_map.get(lr.get("name", ""), {})
                    results.append({
                        "vm_id":      vm.get("id", ""),
                        "vm_name":    lr.get("name", ""),
                        "track":      lr.get("track", 1),
                        "reason":     lr.get("reason", "LLM classification"),
                        "classifier": "granite",
                    })
            except Exception as e:
                # Fall back to Track 1 for unclassified VMs
                for vm in llm_queue:
                    results.append({
                        "vm_id":      vm.get("id", ""),
                        "vm_name":    vm.get("name", ""),
                        "track":      1,
                        "reason":     f"LLM unavailable ({e}) — defaulting to Track 1",
                        "classifier": "fallback",
                    })

        track_summary = {1: 0, 2: 0, 3: 0, 0: 0}
        for r in results:
            track_summary[r["track"]] = track_summary.get(r["track"], 0) + 1

        return {
            "status":        "ok",
            "vm_count":      len(results),
            "classifications": results,
            "summary": {
                "track_1_virtualize": track_summary[1],
                "track_2_replatform": track_summary[2],
                "track_3_modernize":  track_summary[3],
                "skip":               track_summary[0],
            },
        }


    # ── Kubernetes API helpers ────────────────────────────────────────────────

    def _k8s_req(url, token, method="GET", body=None):
        hdrs = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/json",
            "Content-Type": "application/json",
        }
        data = json.dumps(body).encode() if body is not None else None
        req = Request(url, data=data, headers=hdrs, method=method)
        with urlopen(req, context=_ssl_ctx(), timeout=30) as r:
            raw = r.read()
            return json.loads(raw) if raw else {}

    def _k8s_create(base, path, body, token):
        try:
            return _k8s_req(base + path, token, method="POST", body=body)
        except HTTPError as e:
            if e.code == 409:
                return {"status": "already exists"}
            raise

    def _k8s_local_provider(base, token):
        try:
            resp = _k8s_req(
                base + f"/apis/forklift.konveyor.io/v1beta1/namespaces/{MTV_NS}/providers",
                token,
            )
            for item in resp.get("items", []):
                if item.get("spec", {}).get("type") == "openshift":
                    return item["metadata"]["name"]
        except Exception:
            pass
        return "host"

    def _k8s_wait(base, path, token, condition_type, timeout=120):
        deadline = time.time() + timeout
        while time.time() < deadline:
            try:
                resp = _k8s_req(base + path, token)
                for cond in resp.get("status", {}).get("conditions", []):
                    if cond.get("type") == condition_type and cond.get("status") == "True":
                        return True
            except Exception:
                pass
            time.sleep(5)
        return False

    def _k8s_poll_migration(base, path, token, timeout):
        deadline = time.time() + timeout
        while time.time() < deadline:
            try:
                resp = _k8s_req(base + path, token)
                conditions = resp.get("status", {}).get("conditions", [])
                for cond in conditions:
                    if cond.get("type") == "Succeeded" and cond.get("status") == "True":
                        migrated = [
                            v.get("name", "")
                            for v in resp.get("status", {}).get("vms", [])
                        ]
                        return {"status": "Succeeded", "migrated_vms": migrated}
                    if cond.get("type") == "Failed" and cond.get("status") == "True":
                        return {"status": "Failed", "detail": cond.get("message", "")}
            except Exception:
                pass
            time.sleep(10)
        return {"status": "Timeout", "detail": f"Migration did not complete within {timeout}s"}


    # ── skill_mtv_manifest_gen ────────────────────────────────────────────────

    def mtv_manifest_gen(vms, target_namespace="mtv-migrated",
                         network_map=None, storage_map=None,
                         vsphere_provider="vsphere-source", warm=False, timeout=600):
        if not CLUSTER1_API_URL or not CLUSTER1_TOKEN:
            return {"status": "error", "error": "CLUSTER1_API_URL / CLUSTER1_TOKEN not configured"}

        if network_map is None:
            network_map = {"source_id": "dvportgroup-1067", "destination_type": "pod"}
        if storage_map is None:
            storage_map = {
                "source_id": "datastore-1032",
                "storage_class": "ocs-storagecluster-ceph-rbd",
                "access_mode": "ReadWriteMany",
                "volume_mode": "Block",
            }

        ts = int(time.time())
        nm_name  = f"ztp-networkmap-{ts}"
        sm_name  = f"ztp-storagemap-{ts}"
        plan_name = f"ztp-plan-{ts}"
        mig_name  = f"ztp-migration-{ts}"
        base = CLUSTER1_API_URL
        tok  = CLUSTER1_TOKEN
        dest = _k8s_local_provider(base, tok)

        provider_ref = {
            "source":      {"name": vsphere_provider, "namespace": MTV_NS},
            "destination": {"name": dest,             "namespace": MTV_NS},
        }

        nm_dest = {"type": network_map.get("destination_type", "Pod")}
        if network_map.get("destination_name"):
            nm_dest["name"] = network_map["destination_name"]

        _k8s_create(base, f"/apis/forklift.konveyor.io/v1beta1/namespaces/{MTV_NS}/networkmaps",
            {"apiVersion": "forklift.konveyor.io/v1beta1", "kind": "NetworkMap",
             "metadata": {"name": nm_name, "namespace": MTV_NS,
                          "labels": {"ztp-modernization-factory": "true"}},
             "spec": {"map": [{"source": {"id": network_map.get("source_id", "dvportgroup-1067")},
                               "destination": nm_dest}],
                      "provider": provider_ref}}, tok)

        _k8s_create(base, f"/apis/forklift.konveyor.io/v1beta1/namespaces/{MTV_NS}/storagemaps",
            {"apiVersion": "forklift.konveyor.io/v1beta1", "kind": "StorageMap",
             "metadata": {"name": sm_name, "namespace": MTV_NS,
                          "labels": {"ztp-modernization-factory": "true"}},
             "spec": {"map": [{"source": {"id": storage_map.get("source_id", "datastore-1032")},
                               "destination": {
                                   "storageClass": storage_map.get("storage_class", "ocs-storagecluster-ceph-rbd"),
                                   "accessMode":   storage_map.get("access_mode",   "ReadWriteMany"),
                                   "volumeMode":   storage_map.get("volume_mode",   "Block"),
                               }}],
                      "provider": provider_ref}}, tok)

        # Ensure target namespace exists on the destination cluster
        _k8s_create(base, "/api/v1/namespaces",
            {"apiVersion": "v1", "kind": "Namespace",
             "metadata": {"name": target_namespace,
                          "labels": {"ztp-modernization-factory": "true"}}}, tok)

        plan_vms = [{"id": v.get("id", ""), "name": v.get("name", "")} for v in vms if v.get("id")]
        _k8s_create(base, f"/apis/forklift.konveyor.io/v1beta1/namespaces/{MTV_NS}/plans",
            {"apiVersion": "forklift.konveyor.io/v1beta1", "kind": "Plan",
             "metadata": {"name": plan_name, "namespace": MTV_NS,
                          "labels": {"ztp-modernization-factory": "true"}},
             "spec": {"provider": provider_ref,
                      "targetNamespace": target_namespace,
                      "map": {
                          "network": {"name": nm_name, "namespace": MTV_NS},
                          "storage": {"name": sm_name, "namespace": MTV_NS},
                      },
                      "vms": plan_vms,
                      "warm": warm}}, tok)

        _k8s_create(base, f"/apis/forklift.konveyor.io/v1beta1/namespaces/{MTV_NS}/migrations",
            {"apiVersion": "forklift.konveyor.io/v1beta1", "kind": "Migration",
             "metadata": {"name": mig_name, "namespace": MTV_NS,
                          "labels": {"ztp-modernization-factory": "true"}},
             "spec": {"plan": {"name": plan_name, "namespace": MTV_NS}}}, tok)

        result = _k8s_poll_migration(
            base,
            f"/apis/forklift.konveyor.io/v1beta1/namespaces/{MTV_NS}/migrations/{mig_name}",
            tok, timeout)

        return {
            "status":           result["status"],
            "plan_name":        plan_name,
            "migration_name":   mig_name,
            "networkmap_name":  nm_name,
            "storagemap_name":  sm_name,
            "vm_count":         len(plan_vms),
            "vms":              [v["name"] for v in plan_vms],
            "migrated_vms":     result.get("migrated_vms", []),
            "detail":           result.get("detail", ""),
        }


    # ── skill_pipeline_trigger ────────────────────────────────────────────────

    _DEMO_PIPELINE_SPEC = {
        "apiVersion": "tekton.dev/v1", "kind": "Pipeline",
        "metadata": {"name": "ztp-vm-migration", "namespace": TEKTON_NS,
                     "labels": {"ztp-modernization-factory": "true"}},
        "spec": {
            "params": [
                {"name": "vm-names", "type": "string"},
                {"name": "track", "type": "string", "default": "2"},
                {"name": "target-namespace", "type": "string", "default": TEKTON_NS},
            ],
            "tasks": [{"name": "log-vm-info",
                "params": [{"name": "vm-names", "value": "$(params.vm-names)"},
                           {"name": "track", "value": "$(params.track)"},
                           {"name": "target-namespace", "value": "$(params.target-namespace)"}],
                "taskSpec": {
                    "params": [{"name": "vm-names"}, {"name": "track"}, {"name": "target-namespace"}],
                    "steps": [{"name": "log", "image": "registry.access.redhat.com/ubi9-minimal:latest",
                        "script": "#!/bin/sh\necho 'ZTP Pipeline — Track $(params.track)'\n"
                                  "echo 'VMs: $(params.vm-names)'\necho 'Done'"}]}}],
        },
    }

    def _k8s_poll_pipelinerun(base, path, token, timeout):
        deadline = time.time() + timeout
        while time.time() < deadline:
            try:
                resp = _k8s_req(base + path, token)
                for cond in resp.get("status", {}).get("conditions", []):
                    if cond.get("type") == "Succeeded":
                        if cond.get("status") == "True":
                            return {"status": "Succeeded"}
                        if cond.get("status") == "False":
                            return {"status": "Failed",
                                    "detail": cond.get("message", "")}
            except Exception:
                pass
            time.sleep(5)
        return {"status": "Timeout",
                "detail": f"PipelineRun did not complete within {timeout}s"}

    def pipeline_trigger(vms, pipeline_name="ztp-vm-migration",
                         track="2", target_namespace="ztp-factory", timeout=300):
        if not CLUSTER1_API_URL or not CLUSTER1_TOKEN:
            return {"status": "error",
                    "error": "CLUSTER1_API_URL / CLUSTER1_TOKEN not configured"}
        base = CLUSTER1_API_URL
        tok  = CLUSTER1_TOKEN
        vm_names = ",".join(v.get("name", "") for v in vms)
        run_name = f"ztp-run-{int(time.time())}"

        _k8s_create(base,
            f"/apis/tekton.dev/v1/namespaces/{TEKTON_NS}/pipelines",
            _DEMO_PIPELINE_SPEC, tok)

        _k8s_create(base,
            f"/apis/tekton.dev/v1/namespaces/{TEKTON_NS}/pipelineruns",
            {"apiVersion": "tekton.dev/v1", "kind": "PipelineRun",
             "metadata": {"name": run_name, "namespace": TEKTON_NS,
                          "labels": {"ztp-modernization-factory": "true"}},
             "spec": {"pipelineRef": {"name": pipeline_name},
                      "params": [
                          {"name": "vm-names", "value": vm_names},
                          {"name": "track", "value": str(track)},
                          {"name": "target-namespace", "value": target_namespace},
                      ]}}, tok)

        result = _k8s_poll_pipelinerun(
            base,
            f"/apis/tekton.dev/v1/namespaces/{TEKTON_NS}/pipelineruns/{run_name}",
            tok, timeout)

        return {
            "status":            result["status"],
            "pipeline_run_name": run_name,
            "pipeline_name":     pipeline_name,
            "track":             track,
            "vms":               [v.get("name", "") for v in vms],
            "detail":            result.get("detail", ""),
        }


    # ── skill_instancetype_gen ────────────────────────────────────────────────

    _INSTANCE_CATALOG = {
        "u1":  {"small": (1, 2), "medium": (2, 4), "large": (4, 8),
                "xlarge": (8, 16), "2xlarge": (16, 32)},
        "cx1": {"medium": (1, 2), "large": (2, 4), "xlarge": (4, 8),
                "2xlarge": (8, 16)},
        "m1":  {"large": (2, 16), "xlarge": (4, 32), "2xlarge": (8, 64)},
        "n1":  {"medium": (1, 4), "large": (2, 8), "xlarge": (4, 16)},
    }
    _WORKLOAD_SERIES = {
        "web": "cx1", "database": "m1", "loadbalancer": "n1", "general": "u1",
    }
    _OS_PREFERENCE = [
        (r"WINDOWS_SERVER_2022|WINDOWS_SERVER_2021", "windows.2k22"),
        (r"WINDOWS",       "windows.11"),
        (r"CENTOS",        "centos.stream9"),
        (r"RHEL_10|RHEL10","rhel.10"),
        (r"RHEL",          "rhel.9"),
        (r"FEDORA",        "fedora"),
    ]

    def _select_instance_type(cpu_count, memory_gb, workload_type="general"):
        series = _WORKLOAD_SERIES.get(workload_type, "u1")
        catalog = _INSTANCE_CATALOG.get(series, _INSTANCE_CATALOG["u1"])
        for size_name, (cpus, mem) in sorted(catalog.items(), key=lambda x: x[1]):
            if cpus >= cpu_count and mem >= memory_gb:
                return f"{series}.{size_name}", cpus, mem
        for size_name, (cpus, mem) in sorted(
                _INSTANCE_CATALOG["u1"].items(), key=lambda x: x[1]):
            if cpus >= cpu_count and mem >= memory_gb:
                return f"u1.{size_name}", cpus, mem
        return "u1.2xlarge", 16, 32

    def _select_preference(guest_os):
        for pattern, pref in _OS_PREFERENCE:
            if re.search(pattern, guest_os or "", re.IGNORECASE):
                return pref
        return "rhel.9"

    def instancetype_gen(vms, namespace="ztp-factory"):
        if not CLUSTER1_API_URL or not CLUSTER1_TOKEN:
            return {"status": "error",
                    "error": "CLUSTER1_API_URL / CLUSTER1_TOKEN not configured"}
        base = CLUSTER1_API_URL
        tok  = CLUSTER1_TOKEN
        results = []
        for vm in vms:
            cpu = vm.get("cpu_count", 2)
            mem = vm.get("memory_gb", 4)
            wt  = vm.get("workload_type", "general")
            type_name, _, _ = _select_instance_type(cpu, mem, wt)
            pref_name = _select_preference(vm.get("guest_os", ""))
            it_name = f"ztp-{vm.get('name', 'vm')}-type"
            pr_name = f"ztp-{vm.get('name', 'vm')}-pref"
            ns = vm.get("namespace", namespace)
            _k8s_create(base,
                f"/apis/instancetype.kubevirt.io/v1beta1/namespaces/{ns}/virtualmachineinstancetypes",
                {"apiVersion": "instancetype.kubevirt.io/v1beta1",
                 "kind": "VirtualMachineInstancetype",
                 "metadata": {"name": it_name, "namespace": ns,
                              "labels": {"ztp-modernization-factory": "true"}},
                 "spec": {"cpu": {"guest": cpu},
                          "memory": {"guest": f"{int(mem)}Gi"}}}, tok)
            _k8s_create(base,
                f"/apis/instancetype.kubevirt.io/v1beta1/namespaces/{ns}/virtualmachinepreferences",
                {"apiVersion": "instancetype.kubevirt.io/v1beta1",
                 "kind": "VirtualMachinePreference",
                 "metadata": {"name": pr_name, "namespace": ns,
                              "labels": {"ztp-modernization-factory": "true"}},
                 "spec": {"preferredStorageClassName": "ocs-storagecluster-ceph-rbd"}}, tok)
            results.append({"vm_name": vm.get("name", ""),
                            "type_name": type_name, "instance_type": it_name,
                            "preference_name": pr_name,
                            "os_preference": pref_name})
        return {"status": "ok", "instance_types": results}


    # ── skill_oadp_policy ─────────────────────────────────────────────────────

    def oadp_policy(vms, schedule="0 2 * * *", ttl="720h"):
        if not CLUSTER1_API_URL or not CLUSTER1_TOKEN:
            return {"status": "error",
                    "error": "CLUSTER1_API_URL / CLUSTER1_TOKEN not configured"}
        base = CLUSTER1_API_URL
        tok  = CLUSTER1_TOKEN
        namespaces = list({v.get("namespace", "mtv-migrated") for v in vms})
        sched_name = f"ztp-backup-{int(time.time())}"
        _k8s_create(base,
            "/apis/velero.io/v1/namespaces/oadp-user1/schedules",
            {"apiVersion": "velero.io/v1", "kind": "Schedule",
             "metadata": {"name": sched_name, "namespace": "oadp-user1",
                          "labels": {"ztp-modernization-factory": "true"}},
             "spec": {"schedule": schedule,
                      "template": {
                          "ttl": ttl,
                          "includedNamespaces": namespaces,
                          "includedResources": [
                              "virtualmachines", "virtualmachineinstances",
                              "datavolumes", "persistentvolumeclaims"],
                      }}}, tok)
        return {"status": "ok", "schedule_name": sched_name,
                "namespaces": namespaces,
                "vms_covered": [v.get("name", "") for v in vms]}


    # ── skill_self_heal ───────────────────────────────────────────────────────

    def _heuristic_classify(error_message):
        msg = (error_message or "").lower()
        if "timeout" in msg or "timed out" in msg:
            return "transient", "low"
        if "401" in msg or "403" in msg or "unauthorized" in msg or "forbidden" in msg:
            return "auth", "high"
        if "404" in msg or "not found" in msg:
            return "config", "medium"
        if "quota" in msg or "limit" in msg or "insufficient" in msg:
            return "resource", "high"
        if "connection" in msg or "refused" in msg or "reset" in msg:
            return "transient", "medium"
        return "permanent", "medium"

    def self_heal(skill_name, error_message, context=None):
        classification, severity = _heuristic_classify(error_message)
        if not GRANITE_URL:
            return {
                "status": "ok", "classifier": "heuristic",
                "skill_name": skill_name,
                "classification": classification, "severity": severity,
                "remediation_steps": [f"Check {classification} issue for {skill_name}"],
                "retry_suggestion": None,
            }
        safe_skill = _sanitize(skill_name, 40)
        safe_error = _sanitize(error_message, 200)
        safe_ctx = _sanitize(json.dumps(context or {}), 300)
        prompt = (
            "You are an OpenShift migration expert diagnosing a skill failure.\n\n"
            f"Skill: {safe_skill}\n"
            f"Error: {safe_error}\n"
            f"Context: {safe_ctx}\n\n"
            "Respond with ONLY a JSON object:\n"
            '{"classification": "transient|permanent|auth|config|resource",'
            ' "severity": "low|medium|high|critical",'
            ' "remediation_steps": ["step1", "step2"],'
            ' "retry_suggestion": {"wait_seconds": 30, "modified_params": {}} or null}'
        )
        try:
            resp = _json_req(
                GRANITE_URL.rstrip("/") + "/v1/chat/completions",
                payload={
                    "model":       GRANITE_MODEL,
                    "messages":    [{"role": "user", "content": prompt}],
                    "temperature": 0.1,
                    "max_tokens":  256,
                },
            )
            content = resp["choices"][0]["message"]["content"].strip()
            m = re.search(r'\{.*\}', content, re.DOTALL)
            if m:
                parsed = json.loads(m.group(0))
                parsed["status"] = "ok"
                parsed["classifier"] = "granite"
                parsed["skill_name"] = skill_name
                return parsed
        except Exception:
            pass
        return {
            "status": "ok", "classifier": "heuristic",
            "skill_name": skill_name,
            "classification": classification, "severity": severity,
            "remediation_steps": [f"Check {classification} issue for {skill_name}"],
            "retry_suggestion": None,
        }


    # ── /api/v1/migrate — end-to-end orchestration ───────────────────────────

    def migrate(vs_url, vs_user, vs_pass, options=None):
        import uuid
        opts = options or {}
        target_ns = opts.get("target_namespace", "mtv-migrated")
        granite = opts.get("granite_url", GRANITE_URL)
        timeout = opts.get("timeout", 60)
        steps = {}

        try:
            inventory = vsphere_discover(vs_url, vs_user, vs_pass)
            steps["discover"] = {"status": inventory.get("status", "error"),
                                 "vm_count": inventory.get("vm_count", 0)}
        except Exception as e:
            heal = self_heal("vsphere_discover", str(e))
            return {"status": "error", "step_failed": "discover",
                    "error": str(e), "self_heal": heal, "steps": steps}

        vms = inventory.get("vms", [])
        if not vms:
            return {"status": "ok", "vm_count": 0,
                    "message": "No VMs found", "steps": steps}

        try:
            classified = guest_analyzer(vms, granite_url=granite)
            steps["classify"] = {"status": classified.get("status", "error"),
                                 "summary": classified.get("summary", {})}
        except Exception as e:
            steps["classify"] = {"status": "error", "error": str(e)}
            classified = {"classifications": [
                {"vm_id": v.get("id"), "vm_name": v.get("name"),
                 "track": 1, "reason": "fallback"} for v in vms]}

        track_1 = [c for c in classified.get("classifications", []) if c.get("track") == 1]
        track_23 = [c for c in classified.get("classifications", []) if c.get("track") in (2, 3)]

        if track_1:
            t1_vms = [{"id": c["vm_id"], "name": c["vm_name"]} for c in track_1]
            try:
                t1_result = mtv_manifest_gen(t1_vms, target_namespace=target_ns,
                                             timeout=timeout)
                steps["track_1"] = {"status": t1_result.get("status"),
                                    "plan": t1_result.get("plan_name"),
                                    "vms": [c["vm_name"] for c in track_1]}
            except Exception as e:
                steps["track_1"] = {"status": "error", "error": str(e)}

        if track_23:
            t23_vms = [{"id": c.get("vm_id", ""), "name": c["vm_name"]} for c in track_23]
            tracks = {c["vm_name"]: c.get("track", 2) for c in track_23}
            try:
                t23_result = pipeline_trigger(
                    t23_vms, track=str(track_23[0].get("track", 2)),
                    target_namespace=target_ns, timeout=timeout)
                steps["track_2_3"] = {"status": t23_result.get("status"),
                                      "run": t23_result.get("pipeline_run_name"),
                                      "vms": [c["vm_name"] for c in track_23]}
            except Exception as e:
                steps["track_2_3"] = {"status": "error", "error": str(e)}

        all_ok = all(s.get("status") in ("ok", "Timeout", "Succeeded")
                     for s in steps.values())
        return {
            "status":   "ok" if all_ok else "partial",
            "vm_count": len(vms),
            "track_summary": classified.get("summary", {}),
            "steps":    steps,
        }


    # ── Langfuse tracing helpers ─────────────────────────────────────────────

    _TRACE_BUFFER = []
    _METRICS_CALLS = {}
    _METRICS_DURATIONS = {}
    _METRICS_ERRORS = {}

    def _metrics_record(skill, status, duration_ms, error=None):
        key = (skill, status)
        _METRICS_CALLS[key] = _METRICS_CALLS.get(key, 0) + 1
        _METRICS_DURATIONS.setdefault(skill, []).append(duration_ms / 1000.0)
        if error:
            etype = "timeout" if "timeout" in error.lower() else \
                    "auth" if any(c in error.lower() for c in ("401", "403", "unauthorized")) else \
                    "notfound" if "404" in error else \
                    "connection" if "connection" in error.lower() else "other"
            ekey = (skill, etype)
            _METRICS_ERRORS[ekey] = _METRICS_ERRORS.get(ekey, 0) + 1

    def _render_metrics():
        lines = []
        lines.append("# HELP conductor_skill_calls_total Total skill invocations")
        lines.append("# TYPE conductor_skill_calls_total counter")
        for (skill, status), count in sorted(_METRICS_CALLS.items()):
            lines.append(f'conductor_skill_calls_total{{skill="{skill}",status="{status}"}} {count}')
        lines.append("# HELP conductor_skill_duration_seconds Skill execution duration")
        lines.append("# TYPE conductor_skill_duration_seconds histogram")
        buckets = [0.01, 0.1, 1.0, 10.0, 60.0]
        for skill in sorted(_METRICS_DURATIONS.keys()):
            durs = _METRICS_DURATIONS[skill]
            for b in buckets:
                c = sum(1 for d in durs if d <= b)
                lines.append(f'conductor_skill_duration_seconds_bucket{{skill="{skill}",le="{b}"}} {c}')
            lines.append(f'conductor_skill_duration_seconds_bucket{{skill="{skill}",le="+Inf"}} {len(durs)}')
            lines.append(f'conductor_skill_duration_seconds_sum{{skill="{skill}"}} {sum(durs):.4f}')
            lines.append(f'conductor_skill_duration_seconds_count{{skill="{skill}"}} {len(durs)}')
        lines.append("# HELP conductor_skill_errors_total Skill errors by type")
        lines.append("# TYPE conductor_skill_errors_total counter")
        for (skill, etype), count in sorted(_METRICS_ERRORS.items()):
            lines.append(f'conductor_skill_errors_total{{skill="{skill}",error_type="{etype}"}} {count}')
        lines.append("# HELP gen_ai_client_operation_duration_seconds GenAI operation duration (OTel)")
        lines.append("# TYPE gen_ai_client_operation_duration_seconds gauge")
        for skill, durs in sorted(_METRICS_DURATIONS.items()):
            if durs:
                lines.append(f'gen_ai_client_operation_duration_seconds{{operation="{skill}"}} {durs[-1]:.4f}')
        return "\n".join(lines) + "\n"

    def _langfuse_auth():
        return base64.b64encode(f"{LANGFUSE_PK}:{LANGFUSE_SK}".encode()).decode()

    def _langfuse_post(path, payload):
        if not LANGFUSE_URL or not LANGFUSE_PK or not LANGFUSE_SK:
            return None
        try:
            return _json_req(
                LANGFUSE_URL + path,
                payload=payload,
                headers={"Authorization": f"Basic {_langfuse_auth()}"},
            )
        except Exception:
            return None

    def _trace_skill(skill_name, inputs, func, *args, **kwargs):
        import uuid
        trace_id = str(uuid.uuid4())
        t0 = time.time()
        start_iso = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime(t0))
        error = None
        result = None
        try:
            result = func(*args, **kwargs)
            return result
        except Exception as e:
            error = str(e)
            raise
        finally:
            t1 = time.time()
            end_iso = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime(t1))
            duration_ms = round((t1 - t0) * 1000)
            status = result.get("status", "unknown") if isinstance(result, dict) else "error"
            trace = {
                "id": trace_id, "name": skill_name,
                "timestamp": start_iso,
                "input": inputs,
                "output": {"status": status, "duration_ms": duration_ms},
                "metadata": {"error": error},
            }
            _langfuse_post("/api/public/traces", trace)
            _langfuse_post("/api/public/spans", {
                "traceId": trace_id, "name": skill_name,
                "startTime": start_iso, "endTime": end_iso,
                "input": inputs, "output": result,
                "metadata": {"duration_ms": duration_ms},
                "level": "ERROR" if error else "DEFAULT",
                "statusMessage": error or "ok",
            })
            entry = {"id": trace_id, "name": skill_name,
                     "timestamp": start_iso, "duration_ms": duration_ms,
                     "status": status, "error": error}
            _metrics_record(skill_name, status, duration_ms, error)
            _TRACE_BUFFER.append(entry)
            if len(_TRACE_BUFFER) > 100:
                _TRACE_BUFFER.pop(0)

    def _langfuse_list_traces(limit=20):
        recent = list(reversed(_TRACE_BUFFER[-limit:]))
        return {"status": "ok", "trace_count": len(_TRACE_BUFFER), "traces": recent}


    # ── HTTP handler ──────────────────────────────────────────────────────────

    class Handler(BaseHTTPRequestHandler):

        def do_GET(self):
            if self.path.startswith("/q/health") or \
               self.path.startswith("/api/v1/cluster1/health"):
                self._ok(HEALTH)
            elif self.path == "/api/v1/skills":
                self._ok({"skills": SKILLS, "status": "active"})
            elif self.path.startswith("/api/v1/traces"):
                self._ok(_langfuse_list_traces())
            elif self.path == "/metrics":
                data = (_render_metrics() + _render_vsphere_metrics()).encode()
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                self.wfile.write(data)
            else:
                self._ok({"status": "stub", "path": self.path})

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            body = json.loads(self.rfile.read(length)) if length else {}

            if self.path == "/api/v1/skills/vsphere_discover":
                vs_url  = body.get("vsphere_url",      DEFAULT_VSPHERE_URL)
                vs_user = body.get("vsphere_user",     DEFAULT_VSPHERE_USER)
                vs_pass = body.get("vsphere_password", DEFAULT_VSPHERE_PASS)
                if not all([vs_url, vs_user, vs_pass]):
                    self._reply(400, {
                        "error": "vsphere_url, vsphere_user, vsphere_password required "
                                 "(or set VSPHERE_URL / VSPHERE_USER / VSPHERE_PASSWORD env vars)"
                    })
                    return
                try:
                    inputs = {"vsphere_url": vs_url, "vsphere_user": vs_user}
                    result = _trace_skill("vsphere_discover", inputs,
                                          vsphere_discover, vs_url, vs_user, vs_pass)
                    self._ok(result)
                except (URLError, HTTPError) as e:
                    self._reply(502, {"error": f"vSphere API error: {e}"})
                except Exception as e:
                    self._reply(500, {"error": str(e)})

            elif self.path == "/api/v1/skills/guest_analyzer":
                vms = body.get("vms", [])
                if not vms:
                    self._reply(400, {"error": "vms array required"})
                    return
                granite = body.get("granite_url", GRANITE_URL)
                try:
                    inputs = {"vm_count": len(vms), "granite_url": granite or "env"}
                    result = _trace_skill("guest_analyzer", inputs,
                                          guest_analyzer, vms, granite_url=granite)
                    self._ok(result)
                except Exception as e:
                    self._reply(500, {"error": str(e)})

            elif self.path == "/api/v1/skills/mtv_manifest_gen":
                vms = body.get("vms", [])
                if not vms:
                    self._reply(400, {"error": "vms array required"})
                    return
                try:
                    inputs = {"vm_count": len(vms),
                              "target_namespace": body.get("target_namespace", "mtv-migrated")}
                    result = _trace_skill("mtv_manifest_gen", inputs,
                        mtv_manifest_gen,
                        vms,
                        target_namespace=body.get("target_namespace", "mtv-migrated"),
                        network_map=body.get("network_map"),
                        storage_map=body.get("storage_map"),
                        vsphere_provider=body.get("vsphere_provider", "vsphere-source"),
                        warm=body.get("warm", False),
                        timeout=body.get("timeout", 600),
                    )
                    self._ok(result)
                except Exception as e:
                    self._reply(500, {"error": str(e)})

            elif self.path == "/api/v1/skills/pipeline_trigger":
                vms = body.get("vms", [])
                if not vms:
                    self._reply(400, {"error": "vms array required"})
                    return
                try:
                    inputs = {"vm_count": len(vms), "track": body.get("track", "2")}
                    result = _trace_skill("pipeline_trigger", inputs,
                        pipeline_trigger, vms,
                        pipeline_name=body.get("pipeline_name", "ztp-vm-migration"),
                        track=body.get("track", "2"),
                        target_namespace=body.get("target_namespace", "ztp-factory"),
                        timeout=body.get("timeout", 300))
                    self._ok(result)
                except Exception as e:
                    self._reply(500, {"error": str(e)})

            elif self.path == "/api/v1/skills/instancetype_gen":
                vms = body.get("vms", [])
                if not vms:
                    self._reply(400, {"error": "vms array required"})
                    return
                try:
                    inputs = {"vm_count": len(vms)}
                    result = _trace_skill("instancetype_gen", inputs,
                        instancetype_gen, vms,
                        namespace=body.get("namespace", "ztp-factory"))
                    self._ok(result)
                except Exception as e:
                    self._reply(500, {"error": str(e)})

            elif self.path == "/api/v1/skills/oadp_policy":
                vms = body.get("vms", [])
                if not vms:
                    self._reply(400, {"error": "vms array required"})
                    return
                try:
                    inputs = {"vm_count": len(vms)}
                    result = _trace_skill("oadp_policy", inputs,
                        oadp_policy, vms,
                        schedule=body.get("schedule", "0 2 * * *"),
                        ttl=body.get("ttl", "720h"))
                    self._ok(result)
                except Exception as e:
                    self._reply(500, {"error": str(e)})

            elif self.path == "/api/v1/skills/self_heal":
                skill_name = body.get("skill_name", "")
                error_msg = body.get("error_message", "")
                if not skill_name or not error_msg:
                    self._reply(400, {"error": "skill_name and error_message required"})
                    return
                try:
                    inputs = {"skill_name": skill_name}
                    result = _trace_skill("self_heal", inputs,
                        self_heal, skill_name, error_msg,
                        context=body.get("context"))
                    self._ok(result)
                except Exception as e:
                    self._reply(500, {"error": str(e)})

            elif self.path == "/api/v1/migrate":
                vs_url  = body.get("vsphere_url",      DEFAULT_VSPHERE_URL)
                vs_user = body.get("vsphere_user",     DEFAULT_VSPHERE_USER)
                vs_pass = body.get("vsphere_password", DEFAULT_VSPHERE_PASS)
                if not all([vs_url, vs_user, vs_pass]):
                    self._reply(400, {
                        "error": "vsphere_url, vsphere_user, vsphere_password required"
                    })
                    return
                try:
                    inputs = {"vsphere_url": vs_url, "vsphere_user": vs_user}
                    result = _trace_skill("migrate", inputs,
                        migrate, vs_url, vs_user, vs_pass,
                        options=body.get("options"))
                    self._ok(result)
                except Exception as e:
                    self._reply(500, {"error": str(e)})

            else:
                self._ok({"status": "stub", "path": self.path})

        def _ok(self, body):
            self._reply(200, body)

        def _reply(self, code, body):
            data = json.dumps(body, indent=2).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def log_message(self, format, *args):  # noqa: A002
            pass


    # ── vSphere metrics poller ──────────────────────────────────────────────

    _VSPHERE_INVENTORY = {}
    _VSPHERE_POLL_INTERVAL = 30

    def _vsphere_poll_loop():
        while True:
            if DEFAULT_VSPHERE_URL and DEFAULT_VSPHERE_USER and DEFAULT_VSPHERE_PASS:
                try:
                    inv = vsphere_discover(DEFAULT_VSPHERE_URL, DEFAULT_VSPHERE_USER, DEFAULT_VSPHERE_PASS)
                    if inv.get("status") == "ok":
                        _VSPHERE_INVENTORY.update(inv)
                except Exception:
                    pass
            time.sleep(_VSPHERE_POLL_INTERVAL)

    def _render_vsphere_metrics():
        lines = []
        vms = _VSPHERE_INVENTORY.get("vms", [])
        if not vms:
            return ""
        on = sum(1 for v in vms if v.get("power_state") == "POWERED_ON")
        off = sum(1 for v in vms if v.get("power_state") == "POWERED_OFF")
        total_cpu = sum(v.get("cpu_count", 0) for v in vms)
        total_mem = sum(v.get("memory_gb", 0) for v in vms)
        total_disk = sum(v.get("disk_gb", 0) for v in vms)
        lines.append("# HELP vsphere_vm_count VMs in vSphere by power state")
        lines.append("# TYPE vsphere_vm_count gauge")
        lines.append(f'vsphere_vm_count{{power_state="POWERED_ON"}} {on}')
        lines.append(f'vsphere_vm_count{{power_state="POWERED_OFF"}} {off}')
        lines.append("# HELP vsphere_vm_cpu_total Total vCPUs across all VMs")
        lines.append("# TYPE vsphere_vm_cpu_total gauge")
        lines.append(f"vsphere_vm_cpu_total {total_cpu}")
        lines.append("# HELP vsphere_vm_memory_gb_total Total memory in GB")
        lines.append("# TYPE vsphere_vm_memory_gb_total gauge")
        lines.append(f"vsphere_vm_memory_gb_total {total_mem}")
        lines.append("# HELP vsphere_vm_disk_gb_total Total disk in GB")
        lines.append("# TYPE vsphere_vm_disk_gb_total gauge")
        lines.append(f"vsphere_vm_disk_gb_total {total_disk}")
        lines.append("# HELP vsphere_vm_info VM info from vSphere inventory")
        lines.append("# TYPE vsphere_vm_info gauge")
        for v in vms:
            name = _sanitize(v.get("name", ""), 60)
            guest = _sanitize(v.get("guest_os", ""), 40)
            state = v.get("power_state", "")
            lines.append(f'vsphere_vm_info{{name="{name}",guest_os="{guest}",power_state="{state}"}} 1')
        lines.append("# HELP vsphere_network_count Networks in vSphere")
        lines.append("# TYPE vsphere_network_count gauge")
        lines.append(f"vsphere_network_count {len(_VSPHERE_INVENTORY.get('networks', []))}")
        lines.append("# HELP vsphere_datastore_count Datastores in vSphere")
        lines.append("# TYPE vsphere_datastore_count gauge")
        lines.append(f"vsphere_datastore_count {len(_VSPHERE_INVENTORY.get('datastores', []))}")
        return "\n".join(lines) + "\n"


    if __name__ == "__main__":
        poller = threading.Thread(target=_vsphere_poll_loop, daemon=True)
        poller.start()
        print("Conductor extensions listening on :8080", flush=True)
        ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
