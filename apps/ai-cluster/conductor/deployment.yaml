apiVersion: apps/v1
kind: Deployment
metadata:
  name: conductor-extensions
  namespace: conductor-ai
  labels:
    app: conductor-extensions
    ztp-modernization-factory: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conductor-extensions
  template:
    metadata:
      labels:
        app: conductor-extensions
    spec:
      serviceAccountName: default
      containers:
        - name: conductor
          image: registry.access.redhat.com/ubi9/python-311:latest
          command: ["python3", "/app/app.py"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: conductor-config
          env:
            - name: CLUSTER1_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cluster1-credentials
                  key: token
                  optional: true
            - name: MAAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: maas-credentials
                  key: api_key
                  optional: true
          readinessProbe:
            httpGet:
              path: /q/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: stub-code
              mountPath: /app
      volumes:
        - name: stub-code
          configMap:
            name: conductor-stub-code
