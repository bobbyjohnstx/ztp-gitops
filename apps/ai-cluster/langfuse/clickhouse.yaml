apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-clickhouse-config
  namespace: langfuse
  labels:
    ztp-modernization-factory: "true"
data:
  keeper.xml: |
    <clickhouse>
        <keeper_server>
            <tcp_port>9181</tcp_port>
            <server_id>1</server_id>
            <log_storage_path>/var/lib/clickhouse/coordination/log</log_storage_path>
            <snapshot_storage_path>/var/lib/clickhouse/coordination/snapshots</snapshot_storage_path>
            <coordination_settings>
                <operation_timeout_ms>10000</operation_timeout_ms>
                <session_timeout_ms>30000</session_timeout_ms>
                <raft_logs_level>warning</raft_logs_level>
            </coordination_settings>
            <raft_configuration>
                <server>
                    <id>1</id>
                    <hostname>localhost</hostname>
                    <port>9234</port>
                </server>
            </raft_configuration>
        </keeper_server>
        <zookeeper>
            <node>
                <host>localhost</host>
                <port>9181</port>
            </node>
        </zookeeper>
        <macros>
            <shard>1</shard>
            <replica>1</replica>
        </macros>
        <remote_servers>
            <default>
                <shard>
                    <replica>
                        <host>localhost</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </default>
        </remote_servers>
    </clickhouse>
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-clickhouse
  namespace: langfuse
  labels:
    app: langfuse-clickhouse
    ztp-modernization-factory: "true"
spec:
  serviceName: langfuse-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-clickhouse
  template:
    metadata:
      labels:
        app: langfuse-clickhouse
    spec:
      containers:
        - name: clickhouse
          image: docker.io/clickhouse/clickhouse-server:24-alpine
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
            - containerPort: 9181
              name: keeper
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-secret
                  key: password
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.d/keeper.xml
              subPath: keeper.xml
      volumes:
        - name: clickhouse-config
          configMap:
            name: langfuse-clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-clickhouse
  namespace: langfuse
  labels:
    app: langfuse-clickhouse
    ztp-modernization-factory: "true"
spec:
  selector:
    app: langfuse-clickhouse
  ports:
    - port: 8123
      name: http
      targetPort: 8123
    - port: 9000
      name: native
      targetPort: 9000
    - port: 9181
      name: keeper
      targetPort: 9181
