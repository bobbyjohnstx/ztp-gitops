apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-redis
  namespace: langfuse
  labels:
    ztp-modernization-factory: "true"
    app: langfuse-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-redis
  template:
    metadata:
      labels:
        app: langfuse-redis
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-redis
  namespace: langfuse
  labels:
    ztp-modernization-factory: "true"
spec:
  selector:
    app: langfuse-redis
  ports:
    - port: 6379
      targetPort: 6379
