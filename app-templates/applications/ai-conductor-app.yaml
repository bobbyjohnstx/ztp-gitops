apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ztp-ai-conductor
  namespace: openshift-gitops
  labels:
    ztp-modernization-factory: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ${GIT_REPO_URL}
    targetRevision: main
    path: apps/ai-cluster/conductor
  destination:
    server: ${AI_CLUSTER_URL}
    namespace: conductor-ai
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: conductor-config
      namespace: conductor-ai
      jsonPointers:
        - /data
    - group: ""
      kind: ConfigMap
      name: conductor-stub-code
      namespace: conductor-ai
      jsonPointers:
        - /data
